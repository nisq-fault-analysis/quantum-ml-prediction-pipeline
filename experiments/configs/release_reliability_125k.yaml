# Packaged release regression configuration for the 125k thesis dataset.
#
# This path uses the shipped train/validation/test parquet files directly
# instead of rebuilding splits inside the ML pipeline.

data:
  dataset_path: data/raw/thesis_production_125k/thesis_production_125k.parquet
  split_manifest_path: data/raw/thesis_production_125k/release/splits/split_manifest.json
  feature_manifest_path: data/raw/thesis_production_125k/release/splits/feature_manifest.json
  file_format: auto

training:
  target_column: reliability
  excluded_feature_columns:
    - fidelity
    - fidelity_loss
    - bit_errors
    - observed_error_rate
    - bit_error_density
    - timestamp
    - exact_match_probability
    - mitigated_reliability
    - mitigation_gain
    - noise_regime
    - noise_dominant_channel
  n_estimators: 200
  max_depth: 12
  min_samples_split: 2
  min_samples_leaf: 2
  xgboost_n_estimators: 300
  xgboost_max_depth: 6
  xgboost_learning_rate: 0.05
  xgboost_subsample: 0.8
  xgboost_colsample_bytree: 0.8
  xgboost_reg_lambda: 1.0

output:
  experiment_root: experiments/release_reliability
  run_name:
  figures_dir: reports/figures/release_reliability
